upstream hify_web {
    server 10.10.1.1:3001;
    server 10.10.1.2:3000;
    server 10.10.1.3:3000;
}

upstream hify_api {
    server 10.10.1.1:8000;
    server 10.10.1.2:8000;
    server 10.10.1.3:8000;
}

server {
    listen 80;
    server_name hify.888049.xyz;

    client_max_body_size 10m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location = /api {
        return 308 /api/;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://hify_api;
        proxy_read_timeout 700s;
        proxy_send_timeout 700s;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
    }

    location / {
        proxy_pass http://hify_web;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
