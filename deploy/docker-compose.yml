x-backend-environment: &backend-environment
  HIFY_DATABASE_URL: ${HIFY_DATABASE_URL:-postgresql+psycopg://hify:hify_dev_password@postgres:5432/hify}
  HIFY_DATABASE_ECHO: ${HIFY_DATABASE_ECHO:-false}
  HIFY_REDIS_URL: ${HIFY_REDIS_URL:-redis://redis:6379/0}
  HIFY_CELERY_BROKER_URL: ${HIFY_CELERY_BROKER_URL:-redis://redis:6379/0}
  HIFY_CELERY_RESULT_BACKEND_URL: ${HIFY_CELERY_RESULT_BACKEND_URL:-}
  HIFY_CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: ${HIFY_CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-300}
  HIFY_CELERY_TASK_HARD_TIME_LIMIT_SECONDS: ${HIFY_CELERY_TASK_HARD_TIME_LIMIT_SECONDS:-360}
  HIFY_CELERY_VISIBILITY_TIMEOUT_SECONDS: ${HIFY_CELERY_VISIBILITY_TIMEOUT_SECONDS:-3600}
  HIFY_PROVIDER_CREDENTIAL_ENCRYPTION_KEY: ${HIFY_PROVIDER_CREDENTIAL_ENCRYPTION_KEY:?set HIFY_PROVIDER_CREDENTIAL_ENCRYPTION_KEY}
  HIFY_PROVIDER_CREDENTIAL_KEY_VERSION: ${HIFY_PROVIDER_CREDENTIAL_KEY_VERSION:-1}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hify}
      POSTGRES_USER: ${POSTGRES_USER:-hify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hify_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  migration:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-environment
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "8000"

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend-environment
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "hify.bootstrap.celery:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=4",
        "-Q",
        "events,maintenance,ingestion,embedding,llm_batch",
      ]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_HIFY_API_BASE_URL: ${NEXT_PUBLIC_HIFY_API_BASE_URL:-/api}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  redis-data:
